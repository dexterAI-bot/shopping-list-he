<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>מצב קניות</title>
  <style>
    :root{
      --bg:#070c1e;
      --bg2:#0d1430;
      --card:#111a37cc;
      --card-solid:#111a37;
      --stroke:#2a3d7a;
      --text:#eaf0ff;
      --muted:#b7c3ef;
      --primary:#4d7dff;
      --primary-2:#3f6cf0;
      --danger:#a53a47;
      --ok:#2f9e71;
      --chip:#1a2755;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial;
      color:var(--text);
      background:
        radial-gradient(1200px 600px at 100% -10%, #21306a55 0%, transparent 60%),
        radial-gradient(900px 500px at -10% 100%, #1f5f8055 0%, transparent 60%),
        linear-gradient(180deg,var(--bg),var(--bg2));
      min-height:100vh;
    }
    .wrap{max-width:980px;margin:0 auto;padding:18px}
    .topbar{
      position:sticky; top:0; z-index:50;
      backdrop-filter: blur(10px);
      background:#0a1026b3;
      border:1px solid #2a3d7a66;
      border-radius:16px;
      padding:12px 14px;
      margin-bottom:14px;
    }
    .title{display:flex;justify-content:space-between;align-items:center;gap:10px}
    h1{font-size:1.35rem;margin:0}
    .muted{color:var(--muted)}
    .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .pill{font-size:12px;padding:4px 10px;border-radius:999px;background:var(--chip);border:1px solid var(--stroke);color:var(--muted)}

    .card{background:var(--card);border:1px solid var(--stroke);border-radius:16px;padding:14px;margin:12px 0;box-shadow:0 10px 24px #0000002a}
    .card h2{margin:0 0 10px;font-size:1.06rem}

    .row{display:flex;gap:10px;flex-wrap:wrap}
    input,button{font-size:16px}
    input{
      padding:11px 12px;border-radius:12px;border:1px solid var(--stroke);
      background:#0b1430;color:var(--text);min-width:180px;flex:1;
    }
    button{
      padding:11px 13px;border-radius:12px;border:1px solid var(--stroke);
      background:#1a2a63;color:var(--text);cursor:pointer;transition:.15s transform,.15s opacity,.2s background;
    }
    button:hover{transform:translateY(-1px)}
    button.primary{background:linear-gradient(180deg,var(--primary),var(--primary-2));border-color:#5d87ff}
    button.danger{background:linear-gradient(180deg,#be4a59,#9d3747);border-color:#c95f6c}
    button.ok{background:linear-gradient(180deg,#39b780,#289669);border-color:#49c591}

    .cat{margin-top:14px}
    .cat-head{display:flex;justify-content:space-between;align-items:center;gap:8px}
    .item{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:10px;border:1px solid var(--stroke);border-radius:12px;margin:8px 0;background:#0b1533a8}
    .item-name{font-weight:600}

    .empty{padding:18px;border:1px dashed var(--stroke);border-radius:14px;background:#0d183a80;text-align:center}

    dialog{border:none;border-radius:16px;max-width:560px;width:92%;background:var(--card-solid);color:var(--text)}
    dialog::backdrop{background:rgba(0,0,0,.55)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title">
        <h1>🛒 מצב קניות</h1>
        <span class="pill">עברית מלאה</span>
      </div>
      <div id="topStats" class="chips"></div>
    </div>
    <div id="root" class="muted">טוען…</div>
  </div>

  <dialog id="priceDialog">
    <form method="dialog" class="card">
      <h2 style="margin:0 0 8px">הכנסה לעגלה</h2>
      <div id="dlgItem" class="muted" style="margin-bottom:10px"></div>
      <div class="row">
        <input id="price" inputmode="decimal" placeholder="מחיר (ש״ח)" />
        <input id="qtyBought" inputmode="decimal" placeholder="כמות שנקנתה" />
      </div>
      <div style="height:10px"></div>
      <input id="note" placeholder="הערה (אופציונלי)" style="width:100%" />
      <div style="height:12px"></div>
      <div class="row">
        <button value="cancel">ביטול</button>
        <button id="confirm" class="primary" value="ok">הכנס לעגלה</button>
      </div>
    </form>
  </dialog>

<script>
const API = (location.origin.includes('8788') ? 'http://127.0.0.1:8787' : 'https://shopping-list-he-api.vercel.app');

function qs(k){return new URLSearchParams(location.search).get(k)}
function getToken(){
  const q = qs('token');
  if(q) return q;
  const parts = location.pathname.split('/').filter(Boolean);
  // allow /shop/<token>
  if(parts.length>=2 && parts[0]==='shop') return parts[1];
  // allow /<token>
  if(parts.length===1) return parts[0];
  return '';
}

function el(tag, attrs={}, children=[]){
  const e=document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)){
    if(k==='class') e.className=v;
    else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k,v);
  }
  for(const c of children){
    if(typeof c==='string') e.appendChild(document.createTextNode(c));
    else if(c) e.appendChild(c);
  }
  return e;
}

let state=null;
let currentItem=null;

async function api(path, opts={}){
  const res = await fetch(API+path, { ...opts, headers: { 'Content-Type':'application/json', ...(opts.headers||{}) } });
  if(!res.ok) throw new Error(await res.text());
  return res.json();
}

function groupBy(items, keyFn){
  const m=new Map();
  for(const it of items){
    const k=keyFn(it);
    if(!m.has(k)) m.set(k,[]);
    m.get(k).push(it);
  }
  return m;
}

function inCart(itemId){
  return (state.cart||[]).some(c => c.item_id===itemId && Number(c.in_cart)===1);
}

async function toggleCart(it){
  if(!state.trip) return;
  if(inCart(it.id)){
    await api(`/api/shopping/trip/${state.trip.id}/cart/${it.id}`, { method:'POST', body: JSON.stringify({ in_cart:false }) });
    await load();
    return;
  }
  currentItem=it;
  document.getElementById('dlgItem').textContent = it.name_he;
  document.getElementById('price').value='';
  document.getElementById('qtyBought').value=(it.qty ?? '');
  document.getElementById('note').value='';
  const dlg=document.getElementById('priceDialog');
  dlg.showModal();
  const res = await new Promise(resolve=>{
    dlg.addEventListener('close', ()=>resolve(dlg.returnValue), {once:true});
  });
  if(res!=='ok') return;
  const price = parseFloat(document.getElementById('price').value);
  const qty_bought = parseFloat(document.getElementById('qtyBought').value);
  const note = document.getElementById('note').value;
  await api(`/api/shopping/trip/${state.trip.id}/cart/${it.id}`, { method:'POST', body: JSON.stringify({ in_cart:true, price: Number.isFinite(price)?price:null, qty_bought: Number.isFinite(qty_bought)?qty_bought:null, note: note||null }) });
  await load();
}

async function finish(){
  if(!confirm('לסיים קנייה? רק פריטים שבעגלה ירדו מהרשימה.')) return;
  const out = await api(`/api/shopping/trip/${state.trip.id}/finish`, { method:'POST' });
  alert(`סיימתי. נרכשו: ${out.purchasedCount}`);
  await load();
}

async function saveStore(){
  const store_name=document.getElementById('storeName').value.trim();
  const store_branch=document.getElementById('storeBranch').value.trim();
  const city=document.getElementById('storeCity').value.trim();
  if(!store_name){ alert('צריך שם חנות'); return; }
  await api(`/api/shopping/trip/${state.trip.id}/store`, { method:'POST', body: JSON.stringify({ store_name, store_branch: store_branch||null, city: city||null }) });
  await load();
}

function render(){
  const root=document.getElementById('root');
  const topStats=document.getElementById('topStats');
  root.innerHTML='';
  topStats.innerHTML='';
  if(!state){ root.textContent='שגיאה'; return; }

  const trip=state.trip;
  const items = state.items || [];
  const inCartCount = items.filter(i=>inCart(i.id)).length;

  topStats.append(
    el('span',{class:'pill'},[`סטטוס: ${trip?.status||'?'}`]),
    el('span',{class:'pill'},[`פריטים ברשימה: ${items.length}`]),
    el('span',{class:'pill'},[`בעגלה: ${inCartCount}`]),
    el('span',{class:'pill'},[`תוקף קישור: זמני`]),
  );

  root.appendChild(el('div',{class:'card'},[
    el('h2',{},['איפה קונים היום?']),
    el('div',{class:'row'},[
      el('input',{id:'storeName',placeholder:'שם חנות',value: trip?.store_name||''}),
      el('input',{id:'storeBranch',placeholder:'סניף (אופציונלי)',value: trip?.store_branch||''}),
      el('input',{id:'storeCity',placeholder:'עיר (אופציונלי)',value: trip?.city||''}),
      el('button',{class:'primary',onClick:saveStore},['שמור'])
    ])
  ]));

  const byCat = groupBy(items, it => it.category||'כללי');
  if(!items.length){
    root.appendChild(el('div',{class:'card'},[
      el('div',{class:'empty'},[
        el('div',{},['הרשימה כרגע ריקה ✨']),
        el('div',{class:'muted'},['הוסיפו פריטים בקבוצת הטלגרם ואז לחצו שוב על "התחל קניות".'])
      ])
    ]));
  }

  for(const [cat, catItems] of [...byCat.entries()].sort((a,b)=>a[0].localeCompare(b[0],'he'))){
    root.appendChild(el('div',{class:'card cat'},[
      el('div',{class:'cat-head'},[
        el('h2',{},[cat]),
        el('span',{class:'pill'},[`${catItems.length} פריטים`])
      ]),
      ...catItems.map(it => el('div',{class:'item'},[
        el('div',{},[
          el('div',{class:'item-name'},[it.name_he]),
          el('div',{class:'muted'},[it.qty?`כמות: ${it.qty}`:''])
        ]),
        el('button',{class: inCart(it.id)?'danger':'ok', onClick:()=>toggleCart(it)},[ inCart(it.id)?'הוצא מהעגלה':'הכנס לעגלה' ])
      ]))
    ]));
  }

  if(trip?.status==='ACTIVE'){
    root.appendChild(el('div',{class:'card'},[
      el('button',{class:'primary',onClick:finish},[`סיים קנייה (${inCartCount})`])
    ]));
  }
}

async function load(){
  const token = getToken();
  const data = await api(`/api/shopping/session/${token}`);
  state=data;
  render();
}

load().catch(async (e)=>{
  const root = document.getElementById('root');
  const token = getToken();
  root.innerHTML='';
  root.appendChild(el('div',{class:'card'},[
    el('h2',{},['קישור לא תקין / פג תוקף']),
    el('div',{class:'muted'},['פרטי תקלה (לעזרה בדיבוג):']),
    el('div',{class:'muted'},[`token: ${token||'(missing)'}`]),
    el('div',{class:'muted'},[`api: ${API}`]),
    el('div',{class:'muted'},[`error: ${String(e?.message||e)}`])
  ]));
});
</script>
</body>
</html>
